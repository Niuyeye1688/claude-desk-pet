<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="#d4a017" stroke-width="8"/>
  <text x="128" y="155" text-anchor="middle" fill="#d4a017" font-family="Consolas, monospace" font-size="72" font-weight="bold" filter="url(#glow)">&#x2588;</text>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#d4a017" stroke-width="3" opacity="0.3"/>
</svg>